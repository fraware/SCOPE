version: scope-core-v0.1
thresholds:
  rubber_stamp_min_review_seconds: 20
  rubber_stamp_high_risk_count: 10
  scope_overbreadth_tolerance: 0
  stale_grant_rate_warning: 0.05
  approval_without_comment_rate_warning: 0.3
warning_types:
  rubber_stamp_risk:
    description: Reviewer approved high-risk actions with very short review time.
  scope_overbreadth:
    description: Reviewer approved a scope stronger than requested or permitted.
  stale_grant_attempt:
    description: Grant use attempted after expiration condition.
  scope_violation_attempt:
    description: Runtime attempted tool outside grant scope.
  approval_despite_low_evidence:
    description: Approval granted despite weak evidence state.
  residual_block_violation:
    description: Approval did not preserve AKTA residual blocks.
metrics:
  review_turnaround_time:
    category: core
    description: Median time from packet creation to decision submission.
  approval_rate:
    category: core
  rejection_rate:
    category: core
  request_more_evidence_rate:
    category: core
  escalation_rate:
    category: core
  abstention_rate:
    category: core
  reviewer_confidence_mean:
    category: core
    v0_1_status: planned
  reviewer_confidence_variance:
    category: core
    v0_1_status: planned
  approval_without_comment_rate:
